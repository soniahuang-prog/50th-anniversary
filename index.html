<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Aim High, Fly High — 50週年禮品提案</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#121214;--bg2:#1A1A1E;--card:#26262B;--card2:#2E2E35;
  --border:#3A3A42;--accent:#C9A84C;--accent2:#E8C87A;
  --text:#FFFFFF;--text2:#E5E7EB;--text3:#9CA3AF;
  --cover:#0A0A0B;--red:#EF4444;--green:#22C55E;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ══ HERO ══ */
#hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;text-align:center;padding:2rem;}
#hero-canvas{position:absolute;inset:0;z-index:0;}
.grid-bg{background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.12;position:absolute;inset:0;}
.hero-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:1.4rem;}
#site-logo{height:60px;object-fit:contain;display:none;}
#site-mascot{height:110px;object-fit:contain;display:none;filter:drop-shadow(0 0 28px rgba(201,168,76,.4));}
#hero-title{font-size:clamp(2.4rem,5.5vw,5rem);font-weight:800;letter-spacing:.12em;background:linear-gradient(135deg,#fff 0%,var(--accent2) 50%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#hero-subtitle{font-size:clamp(.95rem,2vw,1.3rem);color:var(--text3);letter-spacing:.3em;font-weight:300;}
.hero-divider{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.hero-badge{border:1px solid var(--accent);color:var(--accent);padding:.38rem 1.3rem;border-radius:2px;font-size:.78rem;letter-spacing:.2em;font-weight:500;}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:.4rem;color:var(--text3);font-size:.72rem;letter-spacing:.15em;}
.scroll-hint span{animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(6px);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
.hero-content>*{animation:fadeInUp .8s ease both;}
.hero-content>*:nth-child(1){animation-delay:.1s;}.hero-content>*:nth-child(2){animation-delay:.25s;}
.hero-content>*:nth-child(3){animation-delay:.4s;}.hero-content>*:nth-child(4){animation-delay:.55s;}
.hero-content>*:nth-child(5){animation-delay:.7s;}

/* ══ NAV ══ */
#main-nav{position:sticky;top:0;z-index:100;background:rgba(18,18,20,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:.85rem 2rem;display:flex;align-items:center;justify-content:space-between;}
.nav-tabs{display:flex;gap:.3rem;}
.nav-tab{background:transparent;border:1px solid transparent;color:var(--text3);padding:.45rem 1.1rem;border-radius:2px;cursor:pointer;font-size:.83rem;letter-spacing:.1em;transition:all .22s;}
.nav-tab:hover,.nav-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(201,168,76,.07);}
.nav-logo-zone{cursor:pointer;user-select:none;display:flex;align-items:center;gap:.7rem;}
.nav-logo-zone span{font-size:.73rem;letter-spacing:.22em;color:var(--text3);}

/* ══ MAIN ══ */
#app{padding:3.5rem 2rem;}
.section-title{font-size:1.45rem;font-weight:700;letter-spacing:.14em;color:var(--text);border-left:3px solid var(--accent);padding-left:1rem;margin-bottom:.45rem;}
.section-sub{color:var(--text3);font-size:.82rem;letter-spacing:.05em;margin-bottom:1.8rem;padding-left:1.3rem;}
.category-section{margin-bottom:4.5rem;}
.gift-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.4rem;}
.gift-card{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden;cursor:pointer;transition:transform .28s,border-color .28s,box-shadow .28s;position:relative;}
.gift-card:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:0 14px 44px rgba(201,168,76,.13);}
.gift-card-thumb{width:100%;height:195px;object-fit:cover;display:block;}
.gift-card-placeholder{width:100%;height:195px;background:linear-gradient(135deg,var(--bg2) 0%,var(--card2) 100%);display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--border);}
.gift-card-body{padding:1.1rem 1.3rem 1.3rem;}
.gift-card-id{font-size:.63rem;color:var(--accent);letter-spacing:.2em;font-weight:600;margin-bottom:.35rem;}
.gift-card-name{font-size:.97rem;font-weight:700;color:var(--text);margin-bottom:.45rem;line-height:1.38;}
.gift-card-budget{font-size:.83rem;color:var(--accent2);font-weight:600;}
.gift-card-hint{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(201,168,76,.12));color:var(--accent);font-size:.72rem;letter-spacing:.15em;text-align:center;padding:.6rem;opacity:0;transition:opacity .25s;}
.gift-card:hover .gift-card-hint{opacity:1;}

/* ══════════════════════════════════════
   FULL-SCREEN COVER PAGE
   佈局：左 2/3 文字 | 右 1/3 圖片
══════════════════════════════════════ */
#cover-page{
  position:fixed;inset:0;z-index:800;
  background:var(--cover);
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity .42s cubic-bezier(.22,1,.36,1);
  overflow:hidden;
}
#cover-page.open{opacity:1;pointer-events:all;}

#cover-close{
  position:absolute;top:1.2rem;right:1.6rem;z-index:20;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--text2);padding:.45rem 1.1rem;border-radius:2px;
  cursor:pointer;font-size:.8rem;letter-spacing:.12em;
  display:flex;align-items:center;gap:.4rem;
  transition:all .2s;
}
#cover-close:hover{border-color:var(--accent);color:var(--accent);background:rgba(201,168,76,.08);}

/* ── 雙欄容器：左文右圖 ── */
#cover-inner{
  display:grid;
  grid-template-columns:1fr 2fr;   /* 左 1/3 右 2/3 */
  height:100vh;
  overflow:hidden;
}

/* ── 左側：文字資訊 ── */
#cover-info{
  padding:2.2rem 1.8rem 1.5rem;
  overflow-y:auto;
  display:flex;flex-direction:column;
  gap:.8rem;
  border-right:1px solid var(--border);
}
#cov-id{font-size:.65rem;color:var(--accent);letter-spacing:.22em;font-weight:700;}
#cov-name{font-size:clamp(1.1rem,2vw,1.5rem);font-weight:800;color:var(--text);line-height:1.25;}
.cov-divider{width:48px;height:1px;background:var(--accent);flex-shrink:0;}
#cov-budget{font-size:1rem;color:var(--accent2);font-weight:600;}
#cov-lead{font-size:.8rem;color:var(--text3);}
#cov-desc{
  font-size:.92rem;color:var(--text2);line-height:1.85;
  border-left:2px solid var(--accent);padding-left:.9rem;
}
#cov-desc2{
  font-size:.88rem;color:var(--text3);line-height:1.8;
  background:var(--card);border:1px solid var(--border);border-radius:3px;
  padding:.9rem 1.1rem;
}

/* ── 右側：圖片區 ── */
#cover-img-zone{
  position:relative;
  background:var(--bg);
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* 主圖：等比例縮放，不裁切，不變形 */
#cover-main-img{
  flex:1;
  width:100%;
  max-width:100%;
  max-height:calc(100vh - 80px);   /* 保留縮圖列高度 */
  object-fit:contain;              /* ← 完整顯示，不裁切 */
  object-position:center;
  margin:0 auto;
  display:block;
  transition:opacity .25s;
  padding:.8rem;
}
#cover-img-placeholder{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-size:5rem;color:var(--border);
}

/* 縮圖列 */
#cover-thumbs{
  display:flex;gap:.4rem;padding:.6rem .8rem;
  background:rgba(0,0,0,.55);
  overflow-x:auto;flex-shrink:0;height:68px;align-items:center;
}
#cover-thumbs::-webkit-scrollbar{height:3px;}
#cover-thumbs::-webkit-scrollbar-thumb{background:var(--border);}

/* 縮圖：等比例縮放 */
.cover-thumb{
  width:68px;height:50px;
  object-fit:contain;           /* ← 完整顯示，不裁切 */
  background:var(--bg2);
  border-radius:2px;
  border:1.5px solid transparent;
  cursor:pointer;flex-shrink:0;
  transition:border-color .2s,opacity .2s;
  opacity:.5;padding:2px;
}
.cover-thumb.active,.cover-thumb:hover{border-color:var(--accent);opacity:1;}
.cover-thumb-ph{
  width:68px;height:50px;border-radius:2px;
  background:var(--card2);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;flex-shrink:0;cursor:pointer;
  transition:border-color .2s;opacity:.5;
}
.cover-thumb-ph.active,.cover-thumb-ph:hover{border-color:var(--accent);opacity:1;}

/* 箭頭 */
.img-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(0,0,0,.55);border:1px solid var(--border);
  color:var(--text2);width:34px;height:34px;border-radius:2px;
  cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:5;
}
.img-arrow:hover{border-color:var(--accent);color:var(--accent);}
#arrow-prev{left:.6rem;}
#arrow-next{right:.6rem;}

/* ══════════════════════════════════════
   FULLSCREEN ADMIN
══════════════════════════════════════ */
#admin-page{
  position:fixed;inset:0;z-index:900;
  background:#0D0D10;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity .38s;
  overflow:hidden;
}
#admin-page.open{opacity:1;pointer-events:all;}
#admin-topbar{
  background:#111114;border-bottom:1px solid var(--border);
  padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
#admin-topbar h2{font-size:.88rem;font-weight:700;letter-spacing:.18em;color:var(--accent);}
#admin-layout{display:grid;grid-template-columns:240px 1fr;flex:1;overflow:hidden;}
#admin-sidebar{
  background:#0A0A0D;border-right:1px solid var(--border);
  padding:1rem;overflow-y:auto;display:flex;flex-direction:column;gap:.25rem;
}
.admin-nav-item{
  background:transparent;border:1px solid transparent;
  color:var(--text3);padding:.55rem .9rem;border-radius:2px;
  cursor:pointer;font-size:.8rem;letter-spacing:.08em;
  text-align:left;width:100%;transition:all .2s;
}
.admin-nav-item:hover,.admin-nav-item.active{border-color:var(--accent);color:var(--accent);background:rgba(201,168,76,.06);}
#admin-main{overflow-y:auto;padding:1.6rem 2rem;display:flex;flex-direction:column;gap:1.4rem;}
.admin-section{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:1.3rem;}
.admin-section-title{font-size:.7rem;font-weight:700;letter-spacing:.2em;color:var(--accent);margin-bottom:.9rem;text-transform:uppercase;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.7rem;}
.form-group{display:flex;flex-direction:column;gap:.28rem;}
.form-group.full{grid-column:1/-1;}
label{font-size:.68rem;color:var(--text3);letter-spacing:.1em;}
input[type=text],input[type=password],textarea,select{
  background:#1A1A1E;border:1px solid var(--border);color:var(--text2);
  padding:.55rem .82rem;border-radius:2px;font-size:.82rem;width:100%;
  transition:border-color .2s;font-family:inherit;
}
input[type=text]:focus,input[type=password]:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);}
textarea{resize:vertical;min-height:68px;}
.btn{padding:.55rem 1.2rem;border-radius:2px;cursor:pointer;font-size:.78rem;letter-spacing:.1em;font-weight:600;transition:all .2s;border:1px solid transparent;}
.btn-gold{background:var(--accent);color:#000;border-color:var(--accent);}
.btn-gold:hover{background:var(--accent2);}
.btn-outline{background:transparent;color:var(--text3);border-color:var(--border);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-red{background:transparent;color:var(--red);border-color:var(--red);}
.btn-red:hover{background:rgba(239,68,68,.08);}
.btn-green{background:transparent;color:var(--green);border-color:var(--green);}
.btn-green:hover{background:rgba(34,197,94,.08);}
.btn-sm{padding:.35rem .72rem;font-size:.72rem;}
.gift-admin-list{display:flex;flex-direction:column;gap:.5rem;}
.gift-admin-item{background:#1A1A1E;border:1px solid var(--border);border-radius:3px;padding:.7rem .9rem;display:flex;align-items:center;gap:.55rem;}
.gift-admin-item-info{flex:1;min-width:0;}
.gift-admin-item-name{font-size:.82rem;font-weight:600;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gift-admin-item-cat{font-size:.67rem;color:var(--text3);}
.gift-admin-actions{display:flex;gap:.3rem;flex-shrink:0;}
.order-btns{display:flex;flex-direction:column;gap:2px;}
.order-btn{background:var(--card2);border:1px solid var(--border);color:var(--text3);width:22px;height:19px;cursor:pointer;font-size:.6rem;display:flex;align-items:center;justify-content:center;transition:all .2s;border-radius:1px;}
.order-btn:hover{border-color:var(--accent);color:var(--accent);}
.upload-label{display:inline-flex;align-items:center;gap:.5rem;padding:.52rem 1rem;background:var(--card2);border:1px solid var(--border);border-radius:2px;cursor:pointer;font-size:.78rem;color:var(--text2);transition:all .2s;}
.upload-label:hover{border-color:var(--accent);color:var(--accent);}
input[type=file]{display:none;}
.cat-inputs{display:flex;flex-direction:column;gap:.55rem;}
.info-box{background:#1A1A1E;border:1px solid var(--border);border-radius:3px;padding:.8rem 1rem;font-size:.75rem;color:var(--text3);line-height:1.7;}
.info-box code{color:var(--accent2);font-size:.72rem;}

/* PASSWORD */
#pw-screen{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
#pw-screen.show{display:flex;}
.pw-box{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:2.2rem;display:flex;flex-direction:column;gap:.9rem;min-width:300px;text-align:center;}
.pw-box h3{color:var(--accent);letter-spacing:.15em;font-size:.92rem;}
.pw-box p{color:var(--text3);font-size:.76rem;}
.pw-input{text-align:center;font-size:1.1rem;letter-spacing:.4em;}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:1.6rem;text-align:center;color:var(--text3);font-size:.76rem;letter-spacing:.14em;}

/* RESPONSIVE */
@media(max-width:900px){
  #cover-inner{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  #cover-info{order:2;border-right:none;border-top:1px solid var(--border);padding:1.2rem 1.4rem;}
  #cover-img-zone{order:1;max-height:42vh;}
  #admin-layout{grid-template-columns:1fr;}
  #admin-sidebar{display:none;}
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- PASSWORD -->
<div id="pw-screen">
  <div class="pw-box">
    <h3>🔐 管理後台</h3>
    <p>請輸入管理密碼</p>
    <input type="password" id="pw-input" class="pw-input" maxlength="10" placeholder="· · · ·"/>
    <div style="display:flex;gap:.6rem;">
      <button class="btn btn-gold" style="flex:1" onclick="checkPw()">確認</button>
      <button class="btn btn-outline" style="flex:1" onclick="closePw()">取消</button>
    </div>
    <p id="pw-err" style="color:var(--red);font-size:.72rem;min-height:1rem;"></p>
  </div>
</div>

<!-- HERO -->
<section id="hero">
  <canvas id="hero-canvas"></canvas>
  <div class="grid-bg"></div>
  <div class="hero-content">
    <img id="site-logo" src="" alt="Logo"/>
    <img id="site-mascot" src="" alt="Mascot"/>
    <div class="hero-badge">50 TH · ANNIVERSARY · 2027</div>
    <h1 id="hero-title">Aim High, Fly High</h1>
    <div class="hero-divider"></div>
    <p id="hero-subtitle">50週年 禮品提案選品庫</p>
  </div>
  <div class="scroll-hint"><span>↓</span>SCROLL TO EXPLORE</div>
</section>

<!-- NAV -->
<nav id="main-nav">
  <div class="nav-logo-zone" id="logo-click-zone">
    <span id="nav-title-text">50th ANNIVERSARY</span>
  </div>
  <div class="nav-tabs" id="nav-tabs"></div>
</nav>

<!-- MAIN -->
<main id="app"></main>
<footer>© 2027年 &nbsp;|&nbsp; 50TH ANNIVERSARY · Aim High, Fly High · 禮品提案</footer>

<!-- ════ COVER PAGE ════ -->
<div id="cover-page">
  <button id="cover-close" onclick="closeCover()">✕ &nbsp;關閉</button>
  <div id="cover-inner">

    <!-- 左 2/3：文字 -->
    <div id="cover-info">
      <div id="cov-id"></div>
      <div id="cov-name"></div>
      <div class="cov-divider"></div>
      <div id="cov-budget"></div>
      <div id="cov-lead"></div>
      <div id="cov-desc"></div>
      <div id="cov-desc2"></div>
    </div>

    <!-- 右 1/3：圖片 -->
    <div id="cover-img-zone">
      <img id="cover-main-img" src="" alt="" style="display:none"/>
      <div id="cover-img-placeholder"></div>
      <button class="img-arrow" id="arrow-prev" onclick="shiftImg(-1)">&#8592;</button>
      <button class="img-arrow" id="arrow-next" onclick="shiftImg(1)">&#8594;</button>
      <div id="cover-thumbs"></div>
    </div>

  </div>
</div>

<!-- ════ ADMIN PAGE ════ -->
<div id="admin-page">
  <div id="admin-topbar">
    <h2>⚙ &nbsp;50週年禮品管理後台</h2>
    <button class="btn btn-outline btn-sm" onclick="closeAdmin()">✕ &nbsp;退出後台</button>
  </div>
  <div id="admin-layout">
    <div id="admin-sidebar">
      <button class="admin-nav-item active" onclick="showAdminSection('site',this)">🖼 門面設定</button>
      <button class="admin-nav-item" onclick="showAdminSection('cats',this)">🏷 分類名稱</button>
      <button class="admin-nav-item" onclick="showAdminSection('gifts',this)">🎁 禮品清單</button>
      <button class="admin-nav-item" onclick="showAdminSection('edit',this)">✏ 新增 / 編輯</button>
      <button class="admin-nav-item" onclick="showAdminSection('excel',this)">📊 Excel 匯入匯出</button>
    </div>
    <div id="admin-main"></div>
  </div>
</div>

<script>
/* ══ 雲端資料庫設定 ══ */
// 🌟 核心關鍵：請把你剛剛在 Google 試算表點「發布到網路」拿到的那串 .csv 網址，貼在下方雙引號內！
const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR_2hxSs-OhCn8-i4Z-k9Gi5gKed6Bn_WjOA-Oqi-rI1TKIxSqK2B1YWvmQ4wa1-p_gcS8NURB7cyjv/pub?output=csv";

/* ══ DATA ══ */
// 緩衝備份資料：如果哪天 Google 伺服器斷線，網頁會自動讀取這裡，確保畫面絕對不會一片空白
const INITIAL_GIFTS=[
  {id:"G001",cat:"A",name:"PORTER 機能後背包",desc:"每天背的包包也要跟著換代升級！",desc2:"硬挺俐落包身站立不軟爛",budget:"NT$ 6,650",lead_time:"約6個月",emoji:"🎒",images:[]},
  {id:"G002",cat:"A",name:"PORTER 輕便托特包",desc:"輕量俐落、收納到位。",desc2:"手提斜背兩用切換零秒",budget:"NT$ 3,450",lead_time:"約6個月",emoji:"👜",images:[]}
];

let gifts = [];
let catNames={A:"同仁專屬禮",B:"感謝同行禮",C:"里程共榮禮"};
let siteSettings={title:"Aim High, Fly High",subtitle:"50週年 禮品提案選品庫",logoUrl:"",mascotUrl:""};
let logoClicks=0,logoTimer=null,editingId=null,savedScrollY=0;
let coverImgs=[],coverIdx=0;

// 🌟 雲端 CSV 解析大腦：自動對齊你的 Google 試算表欄位，並防禦任何 Excel 數字型態衝突
// 🌟 萬能型 CSV 解析大腦：能完美應付 Google 試算表更新後的各種引號、換行與特殊符號
function parseCSV(text) {
    if (!text || !text.trim()) return [];
    
    // 正確處理 CSV 的行，避免內容裡有換行導致錯位
    const lines = [];
    let row = [""];
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i+1];
        if (c === '"') {
            if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; } // 處理雙引號轉義
            else { inQuotes = !inQuotes; }
        } else if (c === ',' && !inQuotes) {
            row.push('');
        } else if ((c === '\r' || c === '\n') && !inQuotes) {
            if (c === '\r' && next === '\n') { i++; }
            lines.push(row);
            row = [''];
        } else {
            row[row.length - 1] += c;
        }
    }
    if (row.length > 1 || row[0] !== '') lines.push(row);
    if (lines.length <= 1) return [];

    // 讀取第一行當作欄位對照標題
    const headers = lines[0].map(h => h.trim());
    const keyMap = {
        '商品ID': 'id', '分類': 'cat', '商品名稱': 'name', 
        '規格描述1': 'desc', '規格描述2': 'desc2',
        '預算': 'budget', '交期': 'lead_time', '圖片網址': 'images', '圖示': 'emoji'
    };

    const result = [];
    for (let i = 1; i < lines.length; i++) {
        const rowData = lines[i];
        if (rowData.length === 0 || (rowData.length === 1 && !rowData[0].trim())) continue;

        let g = {};
        headers.forEach((h, index) => {
            const engKey = keyMap[h];
            if (engKey) {
                let val = rowData[index] !== undefined ? rowData[index].trim() : '';
                if (engKey === 'images') {
                    // 🌟 圖片網址防護：不管你用換行、逗號、分號還是空格隔開多張照片，通通自動完美切開
                    g[engKey] = val ? val.split(/[\n,;\s]+/).map(u => u.trim()).filter(u => u) : [];
                } else {
                    g[engKey] = String(val); // 強制安全轉成純文字，杜絕數字型態的 trim() 衝突
                }
            }
        });
        // 只要有商品名稱，就允許過關展示
        if (g.name) result.push(g);
    }
    return result;
}

// 🌟 升級版總啟動開關：每次任何人打開網頁，自動連線 Google 試算表抓取最新資料
async function renderAll() {
    console.log("✨ 顧問夥伴提示：正在隔空抓取 Google 試算表雲端資料庫...");
    try {
        const response = await fetch(GOOGLE_SHEET_CSV_URL);
        if (!response.ok) throw new Error("網路連線異常");
        const csvText = await response.text();
        
        const cloudGifts = parseCSV(csvText);
        if (cloudGifts && cloudGifts.length > 0) {
            gifts = cloudGifts;
            window.gifts = cloudGifts;
            console.log(`✅ 成功同步雲端試算表 ${gifts.length} 筆資料！`);
        } else {
            throw new Error("CSV 解析出來無有效資料");
        }
    } catch (error) {
        console.error("❌ 讀取雲端資料庫失敗，採用本地緩衝：", error);
        if(!gifts || gifts.length === 0) {
            gifts = (typeof INITIAL_GIFTS !== 'undefined') ? JSON.parse(JSON.stringify(INITIAL_GIFTS)) : [];
            window.gifts = gifts;
        }
    }

    // 呼叫前台畫面渲染功能
    currentCat = '全部';
    currentBudget = '全部';
    
    const navs = document.querySelectorAll('.nav-item');
    if(navs.length > 0) {
        navs.forEach(n => n.classList.remove('active'));
        navs[0].classList.add('active');
    }
    
    if (typeof renderGifts === 'function') renderGifts();
    if (typeof updateSummary === 'function') updateSummary();
}

/* ══ EXCEL ══ */
const COL_MAP={
  '禮品代碼':'id','禮品代碼 (id)':'id','禮品代碼(id)':'id',
  '分類':'cat','分類 (cat)':'cat',
  '禮品名稱':'name','禮品名稱 (name)':'name','禮品名稱(name)':'name',
  '簡短描述':'desc','簡短描述 (desc)':'desc','簡短描述(desc)':'desc',
  '特色描述':'desc2','特色描述 (desc2)':'desc2','特色描述(desc2)':'desc2',
  '建議預算':'budget','建議預算 (budget)':'budget','建議預算(budget)':'budget',
  '交期說明':'lead_time','交期說明 (lead_time)':'lead_time','交期說明(lead_time)':'lead_time',
  '圖片網址':'images','多圖網址':'images','圖片網址 (images)':'images',
  'Emoji':'emoji','emoji':'emoji',
  // 英文直通
  'id':'id','cat':'cat','name':'name','desc':'desc','desc2':'desc2',
  'budget':'budget','lead_time':'lead_time','images':'images'
};
const EXPORT_HEADERS={
  id:'禮品代碼',cat:'分類',name:'禮品名稱',
  desc:'簡短描述',desc2:'特色描述',
  budget:'建議預算',lead_time:'交期說明',
  images:'圖片網址',emoji:'Emoji'
};
function rowToGift(r){
  const m={};
  Object.keys(r).forEach(col=>{const k=COL_MAP[col.trim()];if(k)m[k]=String(r[col]??'');});
  return {id:m.id||'',cat:m.cat||'A',name:m.name||'',desc:m.desc||'',desc2:m.desc2||'',
          budget:m.budget||'',lead_time:m.lead_time||'',images:m.images||'',emoji:m.emoji||'🎁'};
}
function renderAdminExcel(main){
  main.innerHTML=`<div class="admin-section">
    <div class="admin-section-title">📊 Excel 匯入 / 匯出</div>
    <div class="info-box" style="margin-bottom:1rem">
      <strong style="color:var(--text2)">Excel 欄位說明（共 7 欄＋Emoji）</strong><br>
      <code>禮品代碼</code>、<code>分類</code>（A/B/C）、<code>禮品名稱</code>、<code>簡短描述</code>、<code>特色描述</code>、<code>建議預算</code>、<code>交期說明</code>、<code>圖片網址</code>（多張以換行或逗號分隔）、<code>Emoji</code><br><br>
      工作表名稱請命名為 <code>50週年禮品清單</code>，找不到時自動解析第一張工作表。
    </div>
    <div style="display:flex;gap:.8rem;flex-wrap:wrap;align-items:center">
      <label class="upload-label">📂 匯入 Excel<input type="file" id="excel-import" accept=".xlsx,.xls" onchange="importExcel(event)"/></label>
      <button class="btn btn-outline btn-sm" onclick="exportExcel()">⬇ 匯出 Excel</button>
    </div>
  </div>`;
}
function importExcel(e) {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const wb = XLSX.read(ev.target.result, { type: 'binary' });
            const sheetName = wb.SheetNames.includes('50週年禮品清單') ? '50週年禮品清單' : wb.SheetNames[0];
            
            // 🌟 核心防禦 1：強制將所有格子當作文字讀取（raw: false），徹底避免 Excel 數字型態衝突
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: '', raw: false });
            
            if (!rows.length) {
                alert(`工作表「${sheetName}」內找不到資料！`);
                return;
            }
            
            const imported = rows.map(row => {
                // 🌟 核心防禦 2：幫 row 裡面的每個欄位做雙重字串防護，確保隨後執行的 rowToGift 安全無虞
                const safeRow = {};
                for (let key in row) {
                    safeRow[key] = row[key] !== undefined && row[key] !== null ? String(row[key]) : '';
                }

                const g = rowToGift(safeRow);
                
                // 🌟 核心修復 3：把 Excel 裡的圖片網址（文字）精準轉回網頁需要的陣列（Array）格式
                if (g && typeof g.images === 'string') {
                    g.images = g.images.split(/[\n,]+/).map(url => url.trim()).filter(url => url);
                }
                return g;
            }).filter(g => g && g.name);
            
            if (!imported.length) {
                alert('解析後無有效禮品（禮品名稱欄位為空）');
                return;
            }
            
            // 同步注入全域，打通 Scope 盲區
            gifts = imported; 
            window.gifts = imported;
            
            alert(`✅ 從「${sheetName}」成功匯入 ${gifts.length} 筆！`);
            showAdminSection('gifts', document.querySelectorAll('.admin-nav-item')[2]);
            
            if (typeof renderGifts === 'function') renderGifts();
            if (typeof renderAll === 'function') renderAll();
            
        } catch (err) {
            alert('匯入失敗：' + err.message);
            console.error(err);
        }
    };
    reader.readAsBinaryString(file);
}

function exportExcel() {
    try {
        let sourceGifts = null;
        
        if (typeof gifts !== 'undefined' && gifts && gifts.length > 0) {
            sourceGifts = gifts;
        } else if (window.gifts && window.gifts.length > 0) {
            sourceGifts = window.gifts;
        } else if (typeof giftData !== 'undefined' && giftData && giftData.length > 0) {
            sourceGifts = giftData;
        } else if (window.giftData && window.giftData.length > 0) {
            sourceGifts = window.giftData;
        }

        if (!sourceGifts || sourceGifts.length === 0) {
            const cards = document.querySelectorAll('.gift-card, .admin-table tbody tr');
            if (cards.length > 0 && typeof currentGifts !== 'undefined') {
                sourceGifts = currentGifts;
            }
        }

        if (!sourceGifts || sourceGifts.length === 0) {
            alert("目前系統口袋尚未載入商品，請在後台任意商品點擊「編輯 ＞ 儲存」，激活記憶體後即可順利匯出！");
            return;
        }

        const keys = ['id','cat','name','desc','desc2','budget','lead_time','images','emoji'];
        
        // 🌟 【超級修正線】確保 EXPORT_HEADERS 存在，並防禦性安全查表，絕對不再噴發 is not a function 錯誤！
        const headersMap = (typeof EXPORT_HEADERS !== 'undefined' && EXPORT_HEADERS) ? EXPORT_HEADERS : {
            id: '商品ID', cat: '分類', name: '商品名稱', desc: '規格描述1', desc2: '規格描述2',
            budget: '預算', lead_time: '交期', images: '圖片網址', emoji: '圖示'
        };

        const cleanData = sourceGifts.map(g => {
            const row = {};
            keys.forEach(k => {
                let val = g[k];
                if (k === 'images' && Array.isArray(val)) {
                    val = val.join(', ');
                }
                const chineseHeader = headersMap[k] || k;
                row[chineseHeader] = val !== undefined && val !== null ? String(val) : '';
            });
            return row;
        });

        const ws = XLSX.utils.json_to_sheet(cleanData);
        
        // 安全設定欄寬
        ws['!cols'] = keys.map(k => {
            const headerText = headersMap[k] || k;
            return { wch: Math.max(headerText.length * 2, 12) };
        });

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '50週年禮品清單');

        XLSX.writeFile(wb, '50th_Anniversary_Gifts.xlsx');
        console.log("✨ 顧問夥伴提示：Excel 匯出成功！");

    } catch (error) {
        console.error("匯出失敗詳細原因：", error);
        alert("匯出時發生小碎石，請打開 Console 查看原因！");
    }
}
